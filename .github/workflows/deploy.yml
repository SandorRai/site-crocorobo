name: Deploy to DigitalOcean Droplet

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Droplet
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DROPLET_IP }}
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Install Docker and Git if missing (basic check)
          if ! command -v docker &> /dev/null; then
              apt-get update && apt-get install -y docker.io git
          fi

          # Setup directory
          mkdir -p /opt/site-crocorobo
          
          # Clone or Pull
          if [ ! -d "/opt/site-crocorobo/.git" ]; then
            git clone https://github.com/${{ github.repository }}.git /opt/site-crocorobo
          else
            cd /opt/site-crocorobo
            git pull
          fi
          
          cd /opt/site-crocorobo
          
          # Build and Run
          docker build -t site-crocorobo .
          docker stop site-web || true
          docker rm site-web || true
          docker run -d --name site-web -p 80:80 --restart unless-stopped site-crocorobo
